<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
background:black;
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
font-family:Arial;
}

#gato{
width:300px;
cursor:pointer;
transition:transform 0.1s;
}

#gato:active{
transform:scaleY(0.8);
}

#contador{
font-size:30px;
margin-top:20px;
}

#pelea{
display:none;
margin-top:20px;
position:relative;
width:400px;
height:200px;
}

.gatoPelea{
width:120px;
position:absolute;
}

/* Animaciones */

#gatoA{
left:0;
animation:peleaA 0.5s infinite;
}

#gatoB{
right:0;
animation:peleaB 0.5s infinite;
}

@keyframes peleaA{

0%{left:0; transform:rotate(0deg);}
50%{left:150px; transform:rotate(-10deg);}
100%{left:0; transform:rotate(0deg);}

}

@keyframes peleaB{

0%{right:0; transform:rotate(0deg);}
50%{right:150px; transform:rotate(10deg);}
100%{right:0; transform:rotate(0deg);}

}

</style>

</head>

<body>

<img id="gato" src="gato.jpg">

<div id="contador">
Caricias: 0
</div>

<div id="pelea">

<h2>🐱 CLUB DE PELEA 🥊</h2>

<img id="gatoA" class="gatoPelea" src="gato1.jpg">
<img id="gatoB" class="gatoPelea" src="gato2.jpg">

</div>

<audio id="meow" src="meow.mp3"></audio>
<audio id="peleaAudio" src="pelea.mp3"></audio>

<script>

let contador = 0

let gato = document.getElementById("gato")
let sonido = document.getElementById("meow")
let pelea = document.getElementById("pelea")
let peleaAudio = document.getElementById("peleaAudio")
let contadorTexto = document.getElementById("contador")

gato.onclick = function(){

contador++

contadorTexto.innerText = "Caricias: " + contador

sonido.currentTime = 0
sonido.play()

if(contador % 100 === 0){

pelea.style.display = "block"

peleaAudio.currentTime = 0
peleaAudio.play()

setTimeout(() => {

pelea.style.display = "none"

},60000)  // 1 minuto

}

}

</script>

</body>

</html>
